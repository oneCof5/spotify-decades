services:
  spotify-decades:
    build: .
    container_name: spotify-decades
    ports:
      - "8080:8080"
    environment:
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      PLAYLIST_PREFIX: ${PLAYLIST_PREFIX:-My}
      PLAYLIST_PUBLIC: ${PLAYLIST_PUBLIC:-false}
      APP_NAME: ${APP_NAME:-Spotify Decades}
    volumes:
      - spotify-decades-data:/data
    restart: unless-stopped

volumes:
  spotify-decades-data:
